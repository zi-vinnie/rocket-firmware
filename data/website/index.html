<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Exe</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
<div id="header">
    <h1>Space Exe</h1>
    <img src="favicon.ico" alt="Space Exe Rocket">
</div>
<div id="content">
    <div id="card-1-container">
        <div id="card-3" class="card">
            <h3>Apogee</h3>
            <hr class="card-divider">
            <div class="value-container">
                <p id="apogee-value" class="value">0.0</p>
                <p id="apogee-unit" class="unit">m</p>
            </div>
        </div>
        <div id="card-1" class="card">
            <h3>Barometer</h3>
            <hr class="card-divider">
            <div class="value-container">
                <p id="barometer-value" class="value">1001.76</p>
                <p id="barometer-unit" class="unit">hPa</p>
            </div>
            <div class="section-header">
                <div></div>
                <h3>Altitude</h3>
                <button class="hidden-button" id="calibrate-altitude-button">
                    <div class="hidden-button-value-container">
                        <p style="line-height: 1.09;" id="calibrated-altitude-value">1001.76</p>
                        <p class="hidden-button-unit">hPa</p>
                    </div>
                </button>
            </div>
            <hr class="card-divider">
            <div class="value-container">
                <p id="altitude-value" class="value">0.0</p>
                <p id="altitude-unit" class="unit">m</p>
            </div>
        </div>
        <div id="card-2-container">
            <div id="card-2" class="card">
                <h3>Temperature 1</h3>
                <hr class="card-divider">
                <div class="value-container">
                    <p id="temp-1-value" class="value">21.8</p>
                    <p id="temp-1-unit" class="unit">°C</p>
                </div>
            </div>
            <div id="card-3" class="card">
                <h3>Temperature 2</h3>
                <hr class="card-divider">
                <div class="value-container">
                    <p id="temp-2-value" class="value">21.9</p>
                    <p id="temp-2-unit" class="unit">°C</p>
                </div>
            </div>
        </div>
    </div>
    <div class="card">
        <button class="main-button" id="toggle-recording-button" data-recording="false">Start Recording</button>
        <div style="display: flex; flex-direction: row; gap: 10px; width: 100%;">
            <button class="main-button" id="download-data-button">Download Sensor Data</button>
            <button class="main-button" id="download-apogee-button">Download Apogee Data</button>
        </div>
        <button class="main-button" id="clear-data-button">Clear Data</button>
    </div>
</div>
</body>
<script>
    const source = new EventSource('/events');
    const sensorPrecision = 2;

    const formatSensorValue = (value) => Number(value ?? 0).toFixed(sensorPrecision);

    source.addEventListener('sensor', (e) => {
    
        const data = JSON.parse(e.data);
        document.getElementById('barometer-value').textContent = formatSensorValue(data.pressure);
        document.getElementById('altitude-value').textContent = formatSensorValue(data.altitude);
        document.getElementById('temp-1-value').textContent = formatSensorValue(data.temperature1);
        document.getElementById('temp-2-value').textContent = formatSensorValue(data.temperature2);
        document.getElementById('apogee-value').textContent = formatSensorValue(data.apogee);
        console.log('Sensor data:', data);
    });

    source.addEventListener('calibration', (e) => {
        const data = JSON.parse(e.data);
        document.getElementById('calibrated-altitude-value').textContent = formatSensorValue(data.calibratedPressure);
        console.log('Calibration:', data);
    });

    source.addEventListener('recording', (e) => {
        const clearDataButton = document.getElementById('clear-data-button');
        const toggleRecordingButton = document.getElementById('toggle-recording-button');
        const downloadDataButton = document.getElementById('download-data-button');
        const downloadApogeeButton = document.getElementById('download-apogee-button');
        const calibrateAltitudeButton = document.getElementById('calibrate-altitude-button');
        clearDataButton.disabled = e.data === 'true';
        downloadDataButton.disabled = e.data === 'true';
        downloadApogeeButton.disabled = e.data === 'true';
        calibrateAltitudeButton.disabled = e.data === 'true';
        if (e.data === 'true') {
            toggleRecordingButton.dataset.recording = 'true';
            toggleRecordingButton.textContent = 'Stop Recording';
        } else {
            toggleRecordingButton.dataset.recording = 'false';
            toggleRecordingButton.textContent = 'Start Recording';
        }
        console.log('Recording:', e.data);
    });

    // Connection lifecycle
    source.onopen = () => console.log('SSE connected');
    source.onerror = () => console.log('SSE error — browser will retry automatically');

    document.getElementById('toggle-recording-button').addEventListener('click', async () => {
        const btn = document.getElementById('toggle-recording-button');
        btn.disabled = true;  // prevent double-clicks while request is in flight

        try {
            const response = await fetch('/toggle-recording', {method: 'POST'});

            if (!response.ok) {
                console.error('Request failed:', response.status);
                alert('Failed to toggle recording');
            }
        } catch (err) {
            console.error('Network error:', err);
            alert('Failed to toggle recording');
        } finally {
            btn.disabled = false;
        }
    });

    document.getElementById('clear-data-button').addEventListener('click', async () => {
        const btn = document.getElementById('clear-data-button');
        const clearDataConfirmation = confirm('Are you sure you want to clear data?');
        if (!clearDataConfirmation) {
            return;
        }

        btn.disabled = true;
        try {
            const response = await fetch('/clear-data', {method: 'POST'});
            if (!response.ok) {
                console.error('Request failed:', response.status);
                alert('Failed to clear data');
            }
        } catch (err) {
            console.error('Network error:', err);
            alert('Failed to clear data');
        } finally {
            // Restore correct state: stay disabled if recording started while the request was in flight
            btn.disabled = document.getElementById('toggle-recording-button').dataset.recording === 'true';
        }
    });

    document.getElementById('download-data-button').addEventListener('click', () => {
        const downloadDataButton = document.getElementById('download-data-button');

        downloadDataButton.disabled = true;
        window.open('/download-sensor-data', '_blank');
        downloadDataButton.disabled = document.getElementById('toggle-recording-button').dataset.recording === 'true';
    });

    document.getElementById('download-apogee-button').addEventListener('click', () => {
        const downloadApogeeButton = document.getElementById('download-apogee-button');
        downloadApogeeButton.disabled = true;
        window.open('/download-apogee', '_blank');
        downloadApogeeButton.disabled = document.getElementById('toggle-recording-button').dataset.recording === 'true';
    });

    document.getElementById('calibrate-altitude-button').addEventListener('click', async () => {
        const btn = document.getElementById('calibrate-altitude-button');
        btn.disabled = true;
        try {
            const response = await fetch('/calibrate-altitude', {method: 'POST'});
            if (!response.ok) {
                console.error('Request failed:', response.status);
                alert('Failed to calibrate altitude');
            }
        } catch (err) {
            console.error('Network error:', err);
            alert('Failed to calibrate altitude');
        } finally {
            btn.disabled = document.getElementById('toggle-recording-button').dataset.recording === 'true';
        }
    });
</script>
</html>
